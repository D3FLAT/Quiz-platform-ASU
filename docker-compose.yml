version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quizdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quizdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quizdb
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: quizdb
      DB_PORT: 5432
      JWT_SECRET: supersecret
      GROQ_API_KEY: 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
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./site
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata: